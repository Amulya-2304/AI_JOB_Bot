<!DOCTYPE html>
<html>
<head>
  <title>Job Results</title>
</head>
<body>
  <h1>Job Results for "{{ keyword }}"</h1>
  <p>Status: {{ status }}</p>

  {% if jobs %}
    <ul>
    {% for job in jobs %}
      <li>
        <strong>{{ job.title }}</strong> at {{ job.company }}<br>
        Location: {{ job.location }} | Type: {{ job.type }}
        <form method="POST" action="#">
          <button disabled>Apply (coming soon)</button>
        </form>
      </li>
    {% endfor %}
    </ul>
  {% else %}
    <p>No job listings matched your search.</p>
  {% endif %}

  <a href="/home">Back to Home</a>
</body>
</html>
